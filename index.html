<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="ジムトレーニング記録アプリ">
    <meta name="theme-color" content="#1f2937">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GymTracker">
    <title>GymTracker - トレーニング記録</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%231f2937' width='192' height='192'/><text x='50%' y='50%' font-size='120' fill='white' text-anchor='middle' dominant-baseline='middle' font-weight='bold'>💪</text></svg>">
    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%231f2937' width='192' height='192'/><text x='50%' y='50%' font-size='120' fill='white' text-anchor='middle' dominant-baseline='middle' font-weight='bold'>💪</text></svg>">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- ホーム画面 -->
    <div id="homeScreen" class="screen active">
        <div class="home-content">
            <div class="header">
                <h1>GymTracker</h1>
            </div>

            <div class="weather-card">
                <div class="weather-current">
                    <div id="weatherTemp" class="weather-temp">--°C</div>
                    <div id="weatherIcon" class="weather-icon">🌤️</div>
                </div>
                <div id="dailyForecast" class="daily-forecast"></div>
            </div>

            <div id="backupReminderCard" class="backup-reminder"></div>

            <button id="startBtn" class="btn-primary btn-large">トレーニング開始</button>

            <div class="action-buttons">
                <button id="menuEditBtn" class="btn-secondary">メニュー編集</button>
                <button id="historyBtn" class="btn-secondary">過去データ</button>
            </div>

            <div id="milestoneCard" class="milestone-card"></div>

            <div id="tipCard" class="tip-card"></div>
        </div>
    </div>

    <!-- トレーニング画面 -->
    <div id="trainingScreen" class="screen">
        <div class="training-header">
            <button class="btn-back">← 戻る</button>
            <h2 id="trainingDayLabel">トレーニング</h2>
        </div>

        <div class="timer-card">
            <div class="timer-display">
                <span id="timerValue">70:00</span>
            </div>
            <div class="timer-controls">
                <button id="timerStartBtn" class="btn-secondary">開始</button>
                <button id="timerPauseBtn" class="btn-secondary" style="display:none;">一時停止</button>
                <button id="timerResetBtn" class="btn-secondary">リセット</button>
            </div>
        </div>

        <button id="focusModeBtn" class="btn-primary">🎯 集中モードで記録</button>

        <div class="recording-section">
            <h3>記録</h3>
            <div id="exerciseList" class="exercise-list">
                <!-- 種目ごとの記録フォームが動的に挿入される -->
            </div>
        </div>

        <button id="addExerciseBtn" class="btn-secondary">＋ 種目を追加</button>
        <button id="finishTrainingBtn" class="btn-primary">トレーニング終了</button>

        <button class="btn-back btn-back-float" aria-label="ホームに戻る">←</button>
    </div>

    <!-- メニュー編集画面 -->
    <div id="menuScreen" class="screen">
        <div class="screen-header">
            <button class="btn-back">← 戻る</button>
            <h2 id="menuDayLabel">メニュー編集</h2>
        </div>

        <div id="menuTabs" class="tabs"></div>

        <div id="menuExerciseList" class="exercise-list"></div>

        <button id="addMenuExerciseBtn" class="btn-secondary">＋ 種目を追加</button>

        <button class="btn-back btn-back-float" aria-label="ホームに戻る">←</button>
    </div>

    <!-- 集中モード画面 -->
    <div id="focusScreen" class="screen">
        <div class="focus-header">
            <button id="focusExitBtn" class="focus-back-btn">◀ 通常画面</button>
            <span id="focusProgress" class="focus-progress"></span>
        </div>

        <div class="focus-card">
            <div id="focusSetLabel" class="focus-set-label">セット 1 / 3</div>
            <h2 id="focusExerciseName" class="focus-exercise-name">種目名</h2>

            <div class="focus-value-row">
                <button id="focusWeightMinus" class="focus-step-btn" aria-label="重量を減らす">−</button>
                <div class="focus-value"><span id="focusWeightValue">0</span><span class="focus-unit">kg</span></div>
                <button id="focusWeightPlus" class="focus-step-btn" aria-label="重量を増やす">＋</button>
            </div>

            <div class="focus-value-row">
                <button id="focusRepsMinus" class="focus-step-btn" aria-label="回数を減らす">−</button>
                <div class="focus-value"><span id="focusRepsValue">0</span><span class="focus-unit">回</span></div>
                <button id="focusRepsPlus" class="focus-step-btn" aria-label="回数を増やす">＋</button>
            </div>

            <div id="focusRestRow" class="focus-rest-row">
                <button id="focusRestToggleBtn" class="btn-secondary">レスト開始</button>
                <span id="focusRestValue" class="focus-rest-value">00:00</span>
            </div>
        </div>

        <div class="focus-nav-row">
            <button id="focusPrevBtn" class="btn-secondary focus-prev-btn">◀ 前へ</button>
            <button id="focusCompleteBtn" class="btn-primary focus-complete-btn">完了 ▶</button>
        </div>

        <p class="focus-hint">💡 ロック画面の早戻し/早送りで回数±、再生ボタンで確定して次へ進めます</p>
    </div>

    <!-- 過去データ画面 -->
    <div id="historyScreen" class="screen">
        <div class="screen-header">
            <button class="btn-back">← 戻る</button>
            <h2>過去データ</h2>
        </div>

        <button id="exportDataBtn" class="btn-secondary">データを書き出す</button>

        <div id="historyVolumeStats" class="volume-stats"></div>

        <div id="historyTabs" class="tabs"></div>

        <div class="history-content">
            <div id="historyTrends" class="history-trends"></div>
            <div id="historySessions"></div>
        </div>

        <button class="btn-back btn-back-float" aria-label="ホームに戻る">←</button>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/milestones.js"></script>
    <script src="js/migration.js"></script>
    <script src="js/weather.js"></script>
    <script src="js/timer.js"></script>
    <script src="js/history.js"></script>
    <script src="js/tips.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/lockscreen.js"></script>
    <script src="js/focus.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
